name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint (eslint + stylelint)
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit + statistical tests
        run: npm test
      - name: Build
        run: npm run build
