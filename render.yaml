# Render.com blueprint — static site. No backend, no server process.
# In Render: New > Blueprint, point it at this repo, and it reads this file.
services:
  - type: web
    name: snake-card-game
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    # single-page app: serve index.html for any path
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
